{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Profile Associate — Legal Services{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-nav fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            <span class="brand-mark me-2">⚖</span> Profile Associate
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navMain" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blogs' %}">Blogs</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                <li class="nav-item ms-lg-3">
                    <a class="btn btn-outline-light btn-sm px-3" href="{% url 'contact' %}">
                        Consultation
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="flex-shrink-0 pt-5 pt-md-6">
    {% block content %}{% endblock %}
</main>

<footer class="footer mt-auto py-4 bg-dark-alt text-light">
    <div class="container text-center">
        <div class="mb-2 small text-muted">Rajesh Adhikari — Criminal • Family • Corporate</div>
        <div class="socials mb-2">
            <a href="https://www.facebook.com" aria-label="Facebook" class="text-white-50 mx-2" target="_blank" rel="noopener"><i class="bi bi-facebook fs-5"></i></a>
            <a href="https://wa.me/9779851006683" aria-label="WhatsApp" class="text-white-50 mx-2" target="_blank" rel="noopener"><i class="bi bi-whatsapp fs-5"></i></a>
        </div>
        <div class="small text-muted mt-3">© {{ now|date:"Y" }} Profile Associate. All Rights Reserved.</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Add subtle shadow to navbar on scroll (improved logic)
    const nav = document.querySelector('.navbar');
    const scrollHandler = () => {
        if (window.scrollY > 50) {
            nav.classList.add('nav-shadow');
        } else {
            nav.classList.remove('nav-shadow');
        }
    };
    document.addEventListener('scroll', scrollHandler);
    // Call once on load in case the page is already scrolled
    document.addEventListener('DOMContentLoaded', scrollHandler);
</script>
</body>
</html>
